apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: queryforge-api
  namespace: queryforge
  labels:
    app.kubernetes.io/name: queryforge
    app.kubernetes.io/component: api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: queryforge-api
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70


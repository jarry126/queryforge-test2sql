apiVersion: apps/v1
kind: Deployment
metadata:
  name: queryforge-api
  namespace: queryforge
  labels:
    app.kubernetes.io/name: queryforge
    app.kubernetes.io/component: api
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: queryforge
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: queryforge
        app.kubernetes.io/component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics/"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: api
          image: queryforge-text2sql:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: queryforge-config
            - secretRef:
                name: queryforge-secret
          readinessProbe:
            httpGet:
              path: /api/v1/ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/v1/live
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/v1/live
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 24
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi

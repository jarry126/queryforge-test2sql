apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: queryforge-api
  namespace: queryforge
  labels:
    app.kubernetes.io/name: queryforge
    app.kubernetes.io/component: api
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: queryforge
      app.kubernetes.io/component: api
  endpoints:
    - port: http
      path: /metrics/
      interval: 15s
